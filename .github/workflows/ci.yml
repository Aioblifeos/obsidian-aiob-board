name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -noEmit -skipLibCheck

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run build
